<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETERCOP - Tienda de Limpieza</title>
    <link rel="stylesheet" href="./styles/style.css">
    <script defer src="./js/main.js" defer></script>
</head>
<body>
    
    <header>
        <h1>Tienda DETERCOP</h1>
        <div id="mensaje-notificacion" class="oculto"></div>
    </header>

    <main>
        <section id="tienda">
            <h2>Nuestros Productos</h2>
            <div id="contenedor-productos"></div>
        </section>

        <aside id="carrito">
            <h2>Tu Carrito</h2>
            <div id="contenedor-carrito">
                <p>El carrito está vacío.</p>
            </div>
            <div id="carrito-total">
                <p>Total: $0</p>
            </div>
            <button id="btn-vaciar" class="btn-secundario">Vaciar Carrito</button>
            <button id="btn-finalizar" class="btn-comprar">Finalizar Compra</button>
        </aside>
    </main>

</body>
</html>
